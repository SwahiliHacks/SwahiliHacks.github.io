  cta_text: Browse Jobs
  cta_url: https://remote.co
- icon: fas fa-users
  title: Fiverr
  tag: Gig Economy
  description: Marketplace for digital services where freelancers offer "gigs" starting at $5 with scalable pricing.
  features:
  - Gig-based system
  - 500+ categories
  - Fiverr Pro (vetted experts)
  - Seller levels system
  - Mobile app management
  links:
