    name: iOS App
    desc: iPhone & iPad
  - url: https://play.google.com/store/apps/details?id=com.mint
    icon: fab fa-android
    name: Android App
    desc: Google Play Store
  rating_stars: 4
  rating_text: 4.3/5 Rating
  cta_text: Start Free
  cta_url: https://www.mint.com
- icon: fas fa-hand-holding-usd
  title: You Need A Budget (YNAB)
  tag: Pro Budgeting
  description: Zero-based budgeting system that gives every dollar a job. Premium tool with exceptional results.
  features:
